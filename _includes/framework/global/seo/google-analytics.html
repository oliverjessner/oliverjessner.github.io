{% assign google_analytics_id = site.env.NETLIFY_GOOGLE_ANALYTICS_ID | default: site.analytics.google_analytics_id | strip %}
{% if jekyll.environment == 'production' and google_analytics_id != '' %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ google_analytics_id | url_encode }}"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
        dataLayer.push(arguments);
    }
    gtag('js', new Date());
    gtag('config', {{ google_analytics_id | jsonify }});
</script>
{% endif %}
